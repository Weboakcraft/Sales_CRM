<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OakCraft Sales CRM — Enquiry to Dispatch</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  color-scheme:light;
  --bg:#f9f9f7; --surface:#ffffff; --surface-2:#fcfcfb; --sidebar:#0f1729; --sidebar-2:#1a2540;
  --text:#0b0b0b; --text-2:#52514e; --muted:#898781; --grid:#e1e0d9; --border:rgba(11,11,11,.10);
  --brand:#2a78d6; --brand-2:#1c5cab;
  --s1:#2a78d6; --s2:#008300; --s3:#e87ba4; --s4:#eda100; --s5:#1baf7a; --s6:#eb6834; --s7:#4a3aa7; --s8:#e34948;
  --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
  --good-ink:#006300;
  --radius:14px; --shadow:0 1px 2px rgba(11,11,11,.04),0 4px 16px rgba(11,11,11,.05);
  --sans:system-ui,-apple-system,"Segoe UI",sans-serif;
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0d0d0d; --surface:#1a1a19; --surface-2:#1f1f1e; --sidebar:#08080c; --sidebar-2:#14141c;
  --text:#ffffff; --text-2:#c3c2b7; --muted:#898781; --grid:#2c2c2a; --border:rgba(255,255,255,.10);
  --brand:#3987e5; --brand-2:#256abf;
  --s1:#3987e5; --s2:#008300; --s3:#d55181; --s4:#c98500; --s5:#199e70; --s6:#d95926; --s7:#9085e9; --s8:#e66767;
  --good:#0ca30c; --good-ink:#0ca30c;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--grid);border-radius:6px}

.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{background:var(--sidebar);color:#cdd5e6;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:11px;padding:20px 20px 18px}
.brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2a78d6,#4a3aa7);display:grid;place-items:center;font-weight:800;color:#fff;font-size:18px;flex-shrink:0}
.brand h1{font-size:16px;color:#fff;font-weight:700;letter-spacing:-.2px}
.brand span{font-size:11px;color:#7b88a8;display:block;font-weight:500}
.nav{padding:8px 12px;flex:1;overflow-y:auto}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:#5d6a8a;padding:14px 12px 6px;font-weight:700}
.nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;color:#aeb8d0;font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.12s;position:relative}
.nav a svg{width:18px;height:18px;flex-shrink:0;stroke-width:2}
.nav a:hover{background:var(--sidebar-2);color:#fff}
.nav a.active{background:linear-gradient(90deg,rgba(42,120,214,.22),rgba(42,120,214,.06));color:#fff}
.nav a.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--brand)}
.nav a .badge{margin-left:auto;background:var(--brand);color:#fff;font-size:11px;padding:1px 7px;border-radius:10px;font-weight:700}
.sidebar-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1baf7a,#008300);display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
.sidebar-foot .info{font-size:12.5px;color:#dfe4ee;font-weight:600}
.sidebar-foot .info small{display:block;color:#7b88a8;font-weight:500;font-size:11px}

/* Main */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 26px;position:sticky;top:0;z-index:20}
.topbar .page-title{font-size:19px;font-weight:700;letter-spacing:-.3px}
.topbar .page-title small{display:block;font-size:12px;color:var(--muted);font-weight:500;letter-spacing:0}
.search{margin-left:auto;position:relative}
.search input{width:260px;padding:9px 12px 9px 36px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text)}
.search svg{position:absolute;left:11px;top:10px;width:16px;height:16px;color:var(--muted)}
.icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--text-2);border:1px solid var(--border);background:var(--surface-2)}
.icon-btn:hover{background:var(--bg)}
.content{padding:24px 26px 40px;overflow-y:auto}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;font-weight:600;font-size:13.5px;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.12s}
.btn:hover{background:var(--bg)}
.btn.primary{background:var(--brand);color:#fff;border-color:transparent}
.btn.primary:hover{background:var(--brand-2)}
.btn svg{width:16px;height:16px}
.btn.sm{padding:6px 11px;font-size:12.5px}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.kpi .k-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi .k-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center}
.kpi .k-ico svg{width:19px;height:19px}
.kpi .val{font-size:26px;font-weight:750;letter-spacing:-.6px}
.kpi .lbl{font-size:12.5px;color:var(--text-2);font-weight:500;margin-top:2px}
.kpi .delta{font-size:12px;font-weight:700;margin-top:9px;display:inline-flex;align-items:center;gap:3px}
.delta.up{color:var(--good-ink)} .delta.down{color:var(--crit)}

/* Panels / grid */
.grid-2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.panel h3{font-size:15px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;justify-content:space-between}
.panel h3 small{font-size:12px;color:var(--muted);font-weight:500}
.panel .chart-wrap{position:relative;height:260px;margin-top:14px}
.panel .chart-sm{height:220px}

/* Funnel */
.funnel{margin-top:16px;display:flex;flex-direction:column;gap:9px}
.funnel-row{display:flex;align-items:center;gap:12px}
.funnel-row .fl{width:96px;font-size:12.5px;color:var(--text-2);font-weight:600}
.funnel-bar{flex:1;height:34px;border-radius:8px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:700;font-size:13px;min-width:60px}
.funnel-row .pct{width:44px;text-align:right;font-size:12.5px;color:var(--muted);font-weight:600}

/* Table */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.card-head h3{font-size:16px;font-weight:700}
.card-head .tools{margin-left:auto;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.field{padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text)}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:11px 20px;background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:13px 20px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
td .strong{font-weight:650}
td .sub{color:var(--muted);font-size:12px}
.tabular{font-variant-numeric:tabular-nums}

/* Badges */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.c-new{color:#256abf;background:rgba(42,120,214,.12)}
.c-prog{color:#b06a00;background:rgba(237,161,0,.14)}
.c-won,.c-good{color:var(--good-ink);background:rgba(12,163,12,.13)}
.c-lost,.c-bad{color:var(--crit);background:rgba(208,59,59,.12)}
.c-quo{color:#7a2fa8;background:rgba(74,58,167,.13)}
.c-ship{color:#0b7a92;background:rgba(27,175,122,.14)}
.c-neutral{color:var(--text-2);background:rgba(137,135,129,.16)}
.prio{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.p-high{color:var(--crit);background:rgba(208,59,59,.1)}
.p-med{color:#b06a00;background:rgba(237,161,0,.13)}
.p-low{color:var(--text-2);background:rgba(137,135,129,.14)}

.avatar-sm{width:30px;height:30px;border-radius:8px;display:inline-grid;place-items:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0}
.cell-user{display:flex;align-items:center;gap:10px}

.row-actions button{width:30px;height:30px;border-radius:8px;color:var(--muted);border:1px solid transparent}
.row-actions button:hover{background:var(--bg);color:var(--brand);border-color:var(--border)}
.row-actions svg{width:15px;height:15px}

.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto}
.stage-col{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px;min-width:180px}
.stage-col h4{font-size:12.5px;font-weight:700;display:flex;justify-content:space-between;margin-bottom:10px;color:var(--text-2)}
.stage-col h4 span{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:0 8px;font-size:11px}
.lead-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow)}
.lead-card .lc-name{font-weight:650;font-size:13px}
.lead-card .lc-meta{font-size:11.5px;color:var(--muted);margin-top:3px}
.lead-card .lc-val{font-weight:700;font-size:13px;margin-top:7px;color:var(--brand)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,8,12,.55);backdrop-filter:blur(3px);display:none;place-items:center;z-index:100;padding:20px}
.modal-bg.show{display:grid}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:17px;font-weight:700}
.modal-body{padding:20px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.form-row{margin-bottom:14px}
.form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row label{display:block;font-size:12.5px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text)}
.form-row input:focus,.form-row select:focus{outline:2px solid var(--brand);border-color:transparent}

.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--bg);padding:13px 20px;border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.3);transform:translateY(120px);transition:.3s;z-index:200}
.toast.show{transform:translateY(0)}

.section-title{font-size:14px;font-weight:700;margin:22px 0 12px;color:var(--text-2)}
.hidden{display:none!important}
.empty{padding:50px;text-align:center;color:var(--muted)}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-3{grid-template-columns:1fr}.pipeline{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">O</div>
      <div><h1>OakCraft CRM</h1><span>Sales Pipeline Suite</span></div>
    </div>
    <nav class="nav" id="nav">
      <div class="nav-label">Overview</div>
      <a data-view="dashboard" data-icon="dash" class="active"><span>Dashboard</span></a>
      <div class="nav-label">Sales Pipeline</div>

      <div class="info">Ankush Goswami<small>Admin · OakCraft</small></div>

  <div class="main">

    <div class="content" id="content"></div>

</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>

<script>
/* ============================================================
   OakCraft Sales CRM — front-end logic (demo build)
   Enquiry → Quotation → Order → Dispatch  +  Dashboard
   Data persists to localStorage (falls back to memory).
   ============================================================ */

/* ---------- storage helpers ---------- */
const store = {
  get(k, def){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return mem[k]??def; } },
  set(k, val){ try{ localStorage.setItem(k, JSON.stringify(val)); }catch(e){ mem[k]=val; } }
};
const mem = {};
const money = n => '₹' + Number(n||0).toLocaleString('en-IN');
const short = n => n>=1e7 ? '₹'+(n/1e7).toFixed(2)+'Cr' : n>=1e5 ? '₹'+(n/1e5).toFixed(2)+'L' : n>=1e3 ? '₹'+(n/1e3).toFixed(1)+'K' : '₹'+n;
const uid = p => p + Date.now().toString(36).slice(-4).toUpperCase() + Math.floor(Math.random()*90+10);
const today = () => new Date().toISOString().slice(0,10);
const initials = s => (s||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const avColors = ['#2a78d6','#008300','#e87ba4','#eda100','#1baf7a','#eb6834','#4a3aa7','#e34948'];
const avColor = s => avColors[(s||'').length % avColors.length];

/* ---------- seed data ---------- */
const SALES = ['Rahul Verma','Priya Nair','Amit Shah','Sneha Rao','Kabir Khan'];
const SOURCES = ['IndiaMART','JustDial','Website','Referral','Trade Show','Cold Call'];
const CITIES = ['Mumbai','Delhi','Bengaluru','Pune','Ahmedabad','Chennai','Jaipur','Surat'];
const CATS = ['Office Furniture','Modular Kitchen','Wardrobes','Seating','Storage','Custom Woodwork'];

function seed(){
  if(store.get('crm_seeded')) return;
  const companies = ['Techno Interiors','Skyline Builders','Green Valley Homes','Urban Nest','Prime Realty','Anand Constructions','Lotus Furnishings','Elite Spaces','Nova Developers','Grand Living','Craft & Co','Vertex Interiors','Maple Homes','Zenith Projects','Orchid Estates','Silverline Decor','Cosmos Realty','Fusion Interiors','Metro Furnish','Harmony Homes'];
  const products = [
    {id:'PRD-1001',name:'Executive Office Desk',sku:'OFD-EX-140',cat:'Office Furniture',price:24500,stock:42,unit:'pc'},
    {id:'PRD-1002',name:'Ergonomic Mesh Chair',sku:'SEAT-ERG-02',cat:'Seating',price:8900,stock:120,unit:'pc'},
    {id:'PRD-1003',name:'Modular Kitchen (L-Shape)',sku:'MK-LS-STD',cat:'Modular Kitchen',price:185000,stock:8,unit:'set'},
    {id:'PRD-1004',name:'2-Door Sliding Wardrobe',sku:'WR-SLD-2D',cat:'Wardrobes',price:46000,stock:15,unit:'pc'},
    {id:'PRD-1005',name:'Conference Table 8-Seat',sku:'OFD-CONF-8',cat:'Office Furniture',price:68000,stock:6,unit:'pc'},
    {id:'PRD-1006',name:'Steel Storage Cabinet',sku:'STG-STL-4S',cat:'Storage',price:12800,stock:60,unit:'pc'},
    {id:'PRD-1007',name:'Reception Sofa (3-Seater)',sku:'SEAT-SOFA-3',cat:'Seating',price:34500,stock:22,unit:'pc'},
    {id:'PRD-1008',name:'Custom TV Unit',sku:'CW-TV-CUST',cat:'Custom Woodwork',price:29000,stock:0,unit:'pc'},
    {id:'PRD-1009',name:'Bookshelf Wall Unit',sku:'STG-BShelf-W',cat:'Storage',price:18500,stock:33,unit:'pc'},
    {id:'PRD-1010',name:'Modular Kitchen (U-Shape)',sku:'MK-US-PREM',cat:'Modular Kitchen',price:265000,stock:4,unit:'set'},
  ];
  const customers = companies.map((c,i)=>({
    id:'CUST-'+(2001+i), name:c, contact:['Rohan','Anita','Vikas','Meera','Suresh','Deepa','Arjun','Kavya','Nikhil','Pooja'][i%10]+' '+['Gupta','Sharma','Reddy','Iyer','Patel','Singh','Menon','Das','Joshi','Bose'][i%10],
    email:'purchase@'+c.toLowerCase().replace(/[^a-z]/g,'')+'.com', phone:'+91 '+(70000+Math.floor(Math.random()*29999))+' '+(10000+Math.floor(Math.random()*89999)),
    city:CITIES[i%CITIES.length], type:i%4===0?'Enterprise':i%3===0?'SMB':'Retail', since:2021+(i%4)
  }));

  const stages=['New','Contacted','Qualified','Quoted','Won','Lost'];
  const prios=['High','Medium','Low'];
  const enquiries=[];
  for(let i=0;i<48;i++){
    const cust=customers[Math.floor(Math.random()*customers.length)];
    const prod=products[Math.floor(Math.random()*products.length)];
    const qty=Math.floor(Math.random()*8)+1;
    const d=new Date(); d.setDate(d.getDate()-Math.floor(Math.random()*75));
    const stage=stages[Math.floor(Math.random()* (i<6?4:6))];
    enquiries.push({
      id:uidSeq('ENQ',i), date:d.toISOString().slice(0,10), customer:cust.name, custId:cust.id,
      product:prod.name, prodId:prod.id, qty, source:SOURCES[Math.floor(Math.random()*SOURCES.length)],
      salesperson:SALES[Math.floor(Math.random()*SALES.length)], stage,
      value:prod.price*qty, priority:prios[Math.floor(Math.random()*prios.length)],
      note:'Requirement for '+prod.cat.toLowerCase()+', site visit '+(Math.random()>.5?'requested':'done')+'.'
    });
  }
  // quotations from quoted/won
  const quotations=[]; const orders=[]; const dispatch=[];
  enquiries.filter(e=>['Quoted','Won'].includes(e.stage)).forEach((e,i)=>{
    const disc=[0,5,8,10][i%4];
    const amt=Math.round(e.value*(1-disc/100));
    const q={id:uidSeq('QT',i), enqId:e.id, customer:e.customer, custId:e.custId, product:e.product, qty:e.qty,
      amount:amt, discount:disc, date:e.date, validTill:addDays(e.date,15), salesperson:e.salesperson,
      status:e.stage==='Won'?'Accepted':['Sent','Draft','Sent'][i%3]};
    quotations.push(q);
    if(q.status==='Accepted'){
      const ostat=['Confirmed','In Production','Ready','Dispatched','Delivered'][i% 5];
      const o={id:uidSeq('ORD',i), quoteId:q.id, customer:q.customer, custId:q.custId, product:q.product, qty:q.qty,
        amount:q.amount, date:addDays(q.date,2), status:ostat, salesperson:q.salesperson,
        payment:['Paid','Partial','Pending'][i%3], expDispatch:addDays(q.date,10)};
      orders.push(o);
      if(['Dispatched','Delivered'].includes(ostat)){
        dispatch.push({id:uidSeq('DSP',i), orderId:o.id, customer:o.customer, product:o.product, qty:o.qty,
          courier:['BlueDart','Delhivery','VRL Logistics','Gati','Self Fleet'][i%5],
          tracking:'TRK'+Math.floor(Math.random()*9000000+1000000), status:ostat==='Delivered'?'Delivered':['Packed','Shipped','Out for Delivery'][i%3],
          dispatchedOn:addDays(o.date,3), eta:addDays(o.date,7)});
      }
    }
  });

  store.set('products',products); store.set('customers',customers);
  store.set('enquiries',enquiries); store.set('quotations',quotations);
  store.set('orders',orders); store.set('dispatch',dispatch);
  store.set('crm_seeded',true);
}
let seqBase=Date.now();
function uidSeq(p,i){ return p+'-'+String(1000+i); }
function addDays(dstr,n){ const d=new Date(dstr); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

function dcard(ico,bg,col,val,lbl,delta,dir){
  return `<div class="kpi"><div class="k-top"><div class="k-ico" style="background:${bg};color:${col}">${I[ico]}</div>

function chartFont(){ const dark=isDark(); return {color:dark?'#c3c2b7':'#52514e'}; }
function isDark(){ return document.documentElement.getAttribute('data-theme')==='dark'; }
function gridColor(){ return isDark()?'#2c2c2a':'#e1e0d9'; }

function drawRevenue(){
  const ctx=document.getElementById('ch-rev'); if(!ctx)return;
  const months=['Feb','Mar','Apr','May','Jun','Jul'];
  const data=[38,44,41,58,63,72], target=[40,45,50,55,60,68];
  state.charts.rev=new Chart(ctx,{type:'line',data:{labels:months,datasets:[
    {label:'Actual',data,borderColor:'#2a78d6',backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,240);g.addColorStop(0,'rgba(42,120,214,.25)');g.addColorStop(1,'rgba(42,120,214,0)');return g;},fill:true,tension:.35,borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#2a78d6',pointBorderColor:'#fff',pointBorderWidth:2},
    {label:'Target',data:target,borderColor:'#898781',borderDash:[5,5],borderWidth:1.8,pointRadius:0,tension:.35,fill:false}
  ]},options:baseOpts({legend:true,yFmt:v=>'₹'+v+'L'})});
}
function drawFunnel(enq,quo,ord,dis){
  const el=document.getElementById('funnel'); if(!el)return;
  const stages=[
    ['Enquiries',enq.length,'#2a78d6'],
    ['Quotations',quo.length,'#4a3aa7'],
    ['Orders',ord.length,'#eda100'],
    ['Dispatched',dis.length,'#1baf7a'],
    ['Delivered',dis.filter(d=>d.status==='Delivered').length,'#008300'],
  ];
  const max=stages[0][1]||1;
  el.className='funnel';
  el.innerHTML=stages.map((s,i)=>{
    const w=Math.max(s[1]/max*100,8);
    const pct=i===0?'100%':Math.round(s[1]/max*100)+'%';
    return `<div class="funnel-row"><div class="fl">${s[0]}</div>
      <div class="funnel-bar" style="width:${w}%;background:${s[2]}">${s[1]}</div>
      <div class="pct">${pct}</div></div>`;
  }).join('');
}
function drawStatus(ord){
  const ctx=document.getElementById('ch-status'); if(!ctx)return;
  const order=['Confirmed','In Production','Ready','Dispatched','Delivered'];
  const cols=['#2a78d6','#eda100','#4a3aa7','#1baf7a','#008300'];
  const counts=order.map(s=>ord.filter(o=>o.status===s).length);
  state.charts.status=new Chart(ctx,{type:'doughnut',data:{labels:order,datasets:[{data:counts,backgroundColor:cols,borderColor:isDark()?'#1a1a19':'#fff',borderWidth:2}]},
    options:{cutout:'62%',plugins:{legend:{position:'right',labels:{boxWidth:10,boxHeight:10,usePointStyle:true,padding:12,font:{size:12},color:chartFont().color}}},responsive:true,maintainAspectRatio:false}});
}
function drawSources(enq){
  const ctx=document.getElementById('ch-src'); if(!ctx)return;
  const counts=SOURCES.map(s=>enq.filter(e=>e.source===s).length);
  state.charts.src=new Chart(ctx,{type:'bar',data:{labels:SOURCES,datasets:[{data:counts,backgroundColor:'#2a78d6',borderRadius:6,barThickness:18}]},
    options:baseOpts({horizontal:true})});
}
function drawSalesBy(enq){
  const ctx=document.getElementById('ch-sales'); if(!ctx)return;
  const vals=SALES.map(s=>enq.filter(e=>e.salesperson===s&&e.stage==='Won').reduce((a,e)=>a+e.value,0));
  state.charts.sales=new Chart(ctx,{type:'bar',data:{labels:SALES.map(s=>s.split(' ')[0]),datasets:[{data:vals,backgroundColor:'#1baf7a',borderRadius:6,barThickness:22}]},
    options:baseOpts({yFmt:v=>short(v)})});
}
function baseOpts({legend=false,horizontal=false,yFmt=v=>v}={}){
  const gc=gridColor(), fc=chartFont().color;
  const catAxis={type:'category',grid:{display:false,drawBorder:false},border:{display:false},
    ticks:{color:fc,font:{size:11.5},autoSkip:false,callback:function(val){return this.getLabelForValue(val);}}};
  const valAxis={grid:{color:gc,drawBorder:false},border:{display:false},
    ticks:{color:fc,font:{size:11.5},callback:yFmt}};
  return {responsive:true,maintainAspectRatio:false,indexAxis:horizontal?'y':'x',
    plugins:{legend:legend?{position:'top',align:'end',labels:{boxWidth:12,usePointStyle:true,padding:14,font:{size:12},color:fc}}:{display:false},
      tooltip:{backgroundColor:isDark()?'#000':'#0b0b0b',padding:10,cornerRadius:8,titleFont:{size:12},bodyFont:{size:12.5}}},
    scales: horizontal ? {x:valAxis,y:catAxis} : {x:catAxis,y:valAxis}};
}

/* ---------- shared cell renderers ---------- */
function userCell(name){ return `<div class="cell-user"><div class="avatar-sm" style="background:${avColor(name)}">${initials(name)}</div><div><div class="strong">${name}</div></div></div>`; }
function stageChip(s){const m={New:'c-new',Contacted:'c-prog',Qualified:'c-quo',Quoted:'c-quo',Won:'c-won',Lost:'c-lost'};return `<span class="chip ${m[s]||'c-neutral'}">${s}</span>`;}
function orderChip(s){const m={Confirmed:'c-new','In Production':'c-prog',Ready:'c-quo',Dispatched:'c-ship',Delivered:'c-won',Cancelled:'c-lost'};return `<span class="chip ${m[s]||'c-neutral'}">${s}</span>`;}
function quoChip(s){const m={Draft:'c-neutral',Sent:'c-new',Accepted:'c-won',Rejected:'c-lost'};return `<span class="chip ${m[s]||'c-neutral'}">${s}</span>`;}
function disChip(s){const m={Pending:'c-neutral',Packed:'c-prog',Shipped:'c-new','Out for Delivery':'c-ship',Delivered:'c-won'};return `<span class="chip ${m[s]||'c-neutral'}">${s}</span>`;}
function payChip(s){const m={Paid:'c-won',Partial:'c-prog',Pending:'c-lost'};return `<span class="chip ${m[s]||'c-neutral'}">${s}</span>`;}
function prioTag(p){return `<span class="prio p-${(p||'').toLowerCase()}">${p}</span>`;}

function paintEnq(){
  const q=(document.getElementById('globalSearch').value||'').toLowerCase();
  let rows=DB.enquiries().filter(e=>
    (!enqFilter.stage||e.stage===enqFilter.stage)&&(!enqFilter.sales||e.salesperson===enqFilter.sales)&&
    (!q||[e.id,e.customer,e.product].join(' ').toLowerCase().includes(q)));
  rows=rows.sort((a,b)=>b.date.localeCompare(a.date));
  const body=document.getElementById('enq-body'); if(!body)return;
  body.innerHTML=rows.length?rows.map(e=>`<tr>
    <td class="strong tabular">${e.id}</td><td class="sub tabular">${e.date}</td>
    <td>${userCell(e.customer)}</td><td>${e.product}</td><td class="tabular">${e.qty}</td>
    <td>${e.source}</td><td>${e.salesperson}</td><td class="strong tabular">${money(e.value)}</td>
    <td>${prioTag(e.priority)}</td><td>${stageChip(e.stage)}</td>
    <td><div class="row-actions" style="display:flex"><button onclick="openEnqModal('${e.id}')" title="Edit">${I.edit}</button><button onclick="delRow('enquiries','${e.id}')" title="Delete">${I.trash}</button></div></td>
  </tr>`).join(''):`<tr><td colspan="11" class="empty">No enquiries match your filters.</td></tr>`;
}

/* ---------- workflow actions ---------- */
const ORDER_FLOW=['Confirmed','In Production','Ready','Dispatched','Delivered'];
function nextStageBtn(o){
  const i=ORDER_FLOW.indexOf(o.status);
  if(o.status==='Delivered')return '<span class="chip c-won">Completed</span>';
  if(o.status==='Cancelled')return '<span class="chip c-lost">Cancelled</span>';
  return `<button class="btn sm" onclick="advanceOrder('${o.id}')">→ ${ORDER_FLOW[i+1]}</button>`;
}
function advanceOrder(id){
  const ord=DB.orders(); const o=ord.find(x=>x.id===id); if(!o)return;
  const i=ORDER_FLOW.indexOf(o.status); o.status=ORDER_FLOW[i+1];
  DB.save('orders',ord);
  if(o.status==='Dispatched'){ // auto-create dispatch record
    const dis=DB.dispatch();
    if(!dis.find(d=>d.orderId===o.id)){
      dis.push({id:uid('DSP-'),orderId:o.id,customer:o.customer,product:o.product,qty:o.qty,
        courier:'BlueDart',tracking:'TRK'+Math.floor(Math.random()*9000000+1000000),status:'Shipped',
        dispatchedOn:today(),eta:addDays(today(),5)});
      DB.save('dispatch',dis);
    }
    toast('Order dispatched — shipment created ✓');
  } else if(o.status==='Delivered'){
    const dis=DB.dispatch(); const d=dis.find(x=>x.orderId===o.id); if(d){d.status='Delivered';DB.save('dispatch',dis);}
    toast('Order delivered ✓');
  } else toast('Order moved to '+o.status);
  refreshBadges(); paintTable('ord-body');
}
function convertQuote(id){
  const quo=DB.quotations(); const q=quo.find(x=>x.id===id); if(!q)return;
  const ord=DB.orders();
  if(ord.find(o=>o.quoteId===id)){toast('Order already exists for this quote');return;}
  q.status='Accepted'; DB.save('quotations',quo);
  ord.push({id:uid('ORD-'),quoteId:q.id,customer:q.customer,custId:q.custId,product:q.product,qty:q.qty,
    amount:q.amount,date:today(),status:'Confirmed',salesperson:q.salesperson,payment:'Pending',expDispatch:addDays(today(),10)});
  DB.save('orders',ord);
  toast('Quote converted to order ✓'); refreshBadges();
  if(state.view==='quotations')paintTable('quo-body'); else setView('orders');
}
function delRow(key,id){
  if(!confirm('Delete this record?'))return;
  DB.save(key,DB[key]().filter(r=>r.id!==id));
  toast('Record deleted'); refreshBadges(); setView(state.view);
}

  document.querySelectorAll('.nav a[data-view]').forEach(a=>a.addEventListener('click',()=>setView(a.dataset.view)));
  document.getElementById('themeBtn').addEventListener('click',()=>{
    document.documentElement.setAttribute('data-theme',isDark()?'light':'dark');applyTheme();setView(state.view);});
  document.getElementById('quickAdd').addEventListener('click',()=>openEnqModal());
  document.getElementById('globalSearch').addEventListener('input',()=>{
    const map={enquiries:'enq-body',quotations:'quo-body',orders:'ord-body',dispatch:'dis-body',customers:'cust-body',products:'prod-body'};
    if(state.view==='enquiries')paintEnq(); else if(map[state.view])paintTable(map[state.view]);});
  setView('dashboard');
}
init();

</script>
</body>
</html>
